<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einheit 1: Der Caesar-Chiffre</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            border-left: 10px solid #3498db;
        }
        h1 { margin-top: 0; color: #2c3e50; }
        p { line-height: 1.6; color: #555; }
        .control-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        input[type="range"] { width: 100%; }
        .output-box {
            background-color: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #3498db;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            min-height: 50px;
            word-break: break-all;
        }
        .key-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        .visual-aid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ Der Caesar-Chiffre</h1>
    <p>Verschlüsselung wie im alten Rom. Wähle einen "Schlüssel" (Verschiebung) und tippe eine Nachricht ein.</p>
    
    <div class="control-group">
        <label for="shift">Der Schlüssel (Verschiebung):</label>
        <input type="range" id="shift" min="1" max="25" value="3" oninput="updateCipher()">
        <div class="key-display">Schlüssel: <span id="shiftValue">3</span></div>
        <div class="visual-aid">
            <span>A &rarr; <span id="exampleChar">D</span></span>
        </div>
    </div>

    <div class="control-group">
        <label for="inputText">Deine geheime Nachricht (Klartext):</label>
        <textarea id="inputText" rows="3" placeholder="Hallo Welt..." oninput="updateCipher()"></textarea>
    </div>

    <div class="control-group">
        <label>Verschlüsseltes Ergebnis (Chiffretext):</label>
        <div id="outputText" class="output-box">...</div>
    </div>
</div>

<script>
    function updateCipher() {
        const text = document.getElementById('inputText').value;
        const shift = parseInt(document.getElementById('shift').value);
        document.getElementById('shiftValue').innerText = shift;
        
        // Update visual example
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        document.getElementById('exampleChar').innerText = alphabet[(shift) % 26];

        let result = "";
        
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            
            if (char.match(/[a-z]/i)) {
                const code = text.charCodeAt(i);
                
                // Großbuchstaben (ASCII 65-90)
                if (code >= 65 && code <= 90) {
                    char = String.fromCharCode(((code - 65 + shift) % 26) + 65);
                }
                // Kleinbuchstaben (ASCII 97-122)
                else if (code >= 97 && code <= 122) {
                    char = String.fromCharCode(((code - 97 + shift) % 26) + 97);
                }
            }
            result += char;
        }
        
        document.getElementById('outputText').innerText = result;
    }
</script>

</body>
</html>
