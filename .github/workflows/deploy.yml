name: Deploy to Neocities

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push to Neocities
        uses: bcomnes/neocities-deployer-action@v2
        with:
          api_key: ${{ secrets.NEOCITIES_API_KEY }}
          cleanup: false