name: Deploy to Neocities

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Neocities client
        run: pip install neocities

      - name: Push files to Neocities
        run: neocities push . --user ${{ secrets.NEOCITIES_API_KEY }} --exclude .git --exclude .github